<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ hàng - AirPure</title>
  <meta name="description" content="Giỏ hàng của bạn - AirPure">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">🌬️ AirPure</a>
        <nav class="header-nav">
          <div class="nav-menu">
            <div class="nav-item dropdown">
              <button class="dropdown-toggle" id="categories-dropdown">
                Danh mục <span class="dropdown-arrow">▼</span>
              </button>
              <div class="dropdown-menu" id="categories-menu">
                <a href="index.html" class="dropdown-item">Tất cả sản phẩm</a>
                <div class="dropdown-divider"></div>
              </div>
            </div>
            <a href="index.html" class="nav-item">Trang chủ</a>
            <a href="cart.html" class="nav-item">Giỏ hàng</a>
          </div>
          <button class="cart-toggle" id="cart-toggle">
            <span class="cart-icon">🛒</span>
            <span class="cart-badge" id="cart-badge">0</span>
          </button>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <!-- Breadcrumb -->
      <nav class="breadcrumb">
        <a href="index.html">Trang chủ</a>
        <span> / </span>
        <span>Giỏ hàng</span>
      </nav>

      <div class="cart-page">
        <h1 class="page-title">Giỏ hàng của bạn</h1>

        <!-- Empty Cart -->
        <div id="empty-cart" class="empty-cart" style="display: none;">
          <div class="empty-icon">🛒</div>
          <h2>Giỏ hàng trống</h2>
          <p>Bạn chưa có sản phẩm nào trong giỏ hàng</p>
          <a href="index.html" class="btn-primary">Tiếp tục mua sắm</a>
        </div>

        <!-- Cart Items -->
        <div id="cart-content" class="cart-content-page">
          <div class="cart-items-section">
            <div id="cart-items-list" class="cart-items-list">
              <!-- Items will be populated by JavaScript -->
            </div>
          </div>

          <!-- Cart Summary -->
          <div class="cart-summary">
            <h2>Tóm tắt đơn hàng</h2>
            <div class="summary-row">
              <span>Tạm tính:</span>
              <span id="cart-subtotal">0₫</span>
            </div>
            <div class="summary-row">
              <span>Phí vận chuyển:</span>
              <span>Miễn phí</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-row total">
              <span>Tổng cộng:</span>
              <span id="cart-total-summary">0₫</span>
            </div>
            <button class="btn-checkout-page" id="checkout-page-btn">
              Thanh toán
            </button>
            <a href="index.html" class="btn-continue-shopping">
              ← Tiếp tục mua sắm
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="common.js"></script>
  <script src="shop-api.js"></script>
  <script>
    // Load footer
    fetch('footer.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('footer-placeholder').innerHTML = html;
        // Initialize subscribe form after footer is loaded
        if (typeof initFooterSubscribeForm === 'function') {
          initFooterSubscribeForm();
        }
        // Initialize contact form after footer is loaded
        if (typeof initFooterContactForm === 'function') {
          initFooterContactForm();
        }
      })
      .catch(err => console.error('Error loading footer:', err));
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      shopAPI = initShopAPI();
      cart = JSON.parse(localStorage.getItem('shop_cart') || '[]');
      updateCartBadge();
      renderCart();
      
      // Load categories (with small delay to ensure DOM is ready)
      setTimeout(() => {
        if (typeof loadAndRenderCategories === 'function') {
          loadAndRenderCategories();
        }
      }, 100);

      // Checkout button
      document.getElementById('checkout-page-btn').addEventListener('click', () => {
        if (cart.length === 0) {
          showToast('Giỏ hàng trống', 'error');
          return;
        }
        window.location.href = 'checkout.html';
      });
    });

    function renderCart() {
      const emptyCart = document.getElementById('empty-cart');
      const cartContent = document.getElementById('cart-content');
      const cartItemsList = document.getElementById('cart-items-list');

      if (cart.length === 0) {
        emptyCart.style.display = 'block';
        cartContent.style.display = 'none';
        return;
      }

      emptyCart.style.display = 'none';
      cartContent.style.display = 'flex';

      // Render items
      cartItemsList.innerHTML = cart.map(item => `
        <div class="cart-item-page">
          ${item.image ? `<img src="${item.image}" alt="${escapeHtml(item.name)}" class="cart-item-image-page">` : '<div class="cart-item-image-placeholder">📦</div>'}
          <div class="cart-item-details">
            <h3 class="cart-item-title-page">${escapeHtml(item.name)}</h3>
            <div class="cart-item-price-page">${formatPrice(item.price)}</div>
          </div>
          <div class="cart-item-actions">
            <div class="qty-controls-page">
              <button class="qty-btn" onclick="changeQtyPage('${item.id}', -1)">−</button>
              <span class="qty-value">${item.qty}</span>
              <button class="qty-btn" onclick="changeQtyPage('${item.id}', 1)">+</button>
            </div>
            <div class="cart-item-total">${formatPrice(item.price * item.qty)}</div>
            <button class="remove-btn-page" onclick="removeFromCartPage('${item.id}')" title="Xóa">🗑️</button>
          </div>
        </div>
      `).join('');

      // Update summary
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      document.getElementById('cart-subtotal').textContent = formatPrice(subtotal);
      document.getElementById('cart-total-summary').textContent = formatPrice(subtotal);
    }

    function changeQtyPage(productId, delta) {
      const cartItem = cart.find(item => item.id === productId);
      if (!cartItem) return;

      cartItem.qty += delta;

      if (cartItem.qty <= 0) {
        removeFromCartPage(productId);
        return;
      }

      if (cartItem.qty > cartItem.stock) {
        showToast('Không đủ hàng trong kho', 'error');
        cartItem.qty = cartItem.stock;
      }

      saveCart();
      updateCartBadge();
      renderCart();
    }

    function removeFromCartPage(productId) {
      cart = cart.filter(item => item.id !== productId);
      saveCart();
      updateCartBadge();
      renderCart();
      showToast('Đã xóa khỏi giỏ hàng', 'info');
    }

  </script>
</body>
</html>
